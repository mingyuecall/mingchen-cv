<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}">{{ page.full_name }}</a>
        <div class="nav-links">
          <a href="#publications">Publications</a>
          <a href="#funding">Funding</a>
          <a href="#service">Service</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="identity">
          <div class="hero-photo-wrap">
            <img class="profile-photo" src="{{ page.photo | relative_url }}" alt="Portrait of {{ page.full_name }}">
          </div>
          <h1>{{ page.full_name }}</h1>
          <p class="pronouns">{{ page.pronouns }}</p>
          <p class="position">{{ page.position }}</p>
          <p class="institution">{{ page.institution }}</p>

          <nav class="profile-links" aria-label="Profile links">
            <a href="mailto:{{ page.email }}" aria-label="Email">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4.5 7h15v10h-15z"/><path d="m5 7.5 7 5 7-5"/></svg>
              <span>Email</span>
            </a>
            <a href="{{ page.google_scholar }}" aria-label="Google Scholar">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 4.5 3.5 9 12 13.5 20.5 9 12 4.5Z"/><path d="M7 11.4v4.2c1.5 1.4 3.2 2.1 5 2.1s3.5-.7 5-2.1v-4.2"/><path d="M20.5 9v5"/></svg>
              <span>Google Scholar</span>
            </a>
            <a href="{{ page.linkedin }}" aria-label="LinkedIn">
              <svg aria-hidden="true" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="1.8"/><path d="M8.4 10.5V16M8.4 8.2v.1M11.5 16v-3.1c0-1.5.9-2.5 2.3-2.5 1.3 0 2.2.9 2.2 2.5V16M11.5 10.6V16"/></svg>
              <span>LinkedIn</span>
            </a>
            <a href="{{ page.orcid }}" aria-label="ORCID">
              <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.2"/><text x="12" y="15.2" text-anchor="middle">iD</text></svg>
              <span>ORCID</span>
            </a>
            <a href="{{ page.researchgate }}" aria-label="ResearchGate">
              <svg class="rg-icon" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><text x="12" y="15.1" text-anchor="middle">RG</text></svg>
              <span>ResearchGate</span>
            </a>
          </nav>
        </div>

        <div class="summary-panel">
          <p class="welcome">{{ page.welcome }}</p>

          <section class="interests" aria-label="Research interests">
            <div class="interest-title">
              <span class="interest-icon">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3.5 13.7 8l4.8 1.7-4.8 1.7L12 16l-1.7-4.6L5.5 9.7 10.3 8 12 3.5Z"/><path d="m18 14 .9 2.1L21 17l-2.1.9L18 20l-.9-2.1L15 17l2.1-.9L18 14Z"/></svg>
              </span>
              <h2>Interests</h2>
            </div>
            <div class="interest-list">
              {% for interest in page.interests %}
                <span>{{ interest }}</span>
              {% endfor %}
            </div>
          </section>
        </div>
      </section>

      <article class="content">
        {{ content }}
      </article>
    </main>
  </body>
</html>
