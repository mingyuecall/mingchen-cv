<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  </head>
  <body>
    <main class="page">
      <aside class="profile">
        <div class="profile-card">
          <img class="profile-photo" src="{{ page.photo | relative_url }}" alt="Portrait of {{ page.full_name }}">
          <h1>{{ page.full_name }}</h1>
          <p class="role">{{ page.role }}</p>
          <p class="affiliation">{{ page.affiliation }}</p>

          <nav class="profile-links" aria-label="Profile links">
            <a href="mailto:{{ page.email }}">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 6.5h16v11H4z"/><path d="m4 7 8 6 8-6"/></svg>
              <span>Email</span>
            </a>
            <a href="{{ page.google_scholar }}">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 4 3 9l9 5 9-5-9-5Z"/><path d="M6.5 11.2v4.1c1.6 1.6 3.5 2.4 5.5 2.4s3.9-.8 5.5-2.4v-4.1"/></svg>
              <span>Google Scholar</span>
            </a>
            <a href="{{ page.orcid }}">
              <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M9 9v6M9 7.2v.1M12 15V9h2.1c1.8 0 3.2 1.3 3.2 3s-1.4 3-3.2 3H12Z"/></svg>
              <span>ORCID</span>
            </a>
            <a href="{{ page.researchgate }}">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M6.5 17V7h5.2c2.1 0 3.5 1.1 3.5 3 0 1.4-.8 2.4-2.1 2.8L16 17h-2.6l-2.5-3.8H9V17H6.5Z"/><path d="M9 11.2h2.4c.8 0 1.3-.4 1.3-1.1S12.2 9 11.4 9H9v2.2Z"/></svg>
              <span>ResearchGate</span>
            </a>
          </nav>
        </div>
      </aside>

      <article class="content">
        {{ content }}
      </article>
    </main>
  </body>
</html>
