<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}">{{ page.full_name }}</a>
        <div class="nav-links">
          <a href="#publications">Publications</a>
          <a href="#funding">Funding</a>
          <a href="#service">Service</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-photo-wrap">
          <img class="profile-photo" src="{{ page.photo | relative_url }}" alt="Portrait of {{ page.full_name }}">
        </div>

        <div class="hero-content">
          <h1>{{ page.full_name }}</h1>

          <nav class="profile-links" aria-label="Profile links">
            <a href="mailto:{{ page.email }}" aria-label="Email">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 6.5h16v11H4z"/><path d="m4 7 8 6 8-6"/></svg>
              <span>Email</span>
            </a>
            <a href="{{ page.google_scholar }}" aria-label="Google Scholar">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 4 3 9l9 5 9-5-9-5Z"/><path d="M6.5 11.2v4.1c1.6 1.6 3.5 2.4 5.5 2.4s3.9-.8 5.5-2.4v-4.1"/></svg>
              <span>Google Scholar</span>
            </a>
            <a href="{{ page.linkedin }}" aria-label="LinkedIn">
              <svg aria-hidden="true" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2.5"/><path d="M8 10.5V17M8 7.5v.1M12 17v-3.7c0-1.8 1.1-3 2.8-3 1.5 0 2.7 1.1 2.7 3V17M12 10.6V17"/></svg>
              <span>LinkedIn</span>
            </a>
            <a href="{{ page.orcid }}" aria-label="ORCID">
              <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M9 9v6M9 7.2v.1M12 15V9h2.1c1.8 0 3.2 1.3 3.2 3s-1.4 3-3.2 3H12Z"/></svg>
              <span>ORCID</span>
            </a>
            <a href="{{ page.researchgate }}" aria-label="ResearchGate">
              <svg class="rg-icon" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><text x="12" y="15.1" text-anchor="middle">RG</text></svg>
              <span>ResearchGate</span>
            </a>
          </nav>

          <p class="welcome">{{ page.welcome }}</p>
        </div>
      </section>

      <article class="content">
        {{ content }}
      </article>
    </main>
  </body>
</html>
